prompt: >
  Create a Java utility class named OutlierSensitivityAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double outlierSensitivity(int[] values)

  Requirement:
  "Return a score measuring how sensitive the dataset is to its most extreme value. Compare the result with and without the extreme value. If fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.OutlierSensitivityAmbiguity

tests:
  - methodName: outlierSensitivity
    args: [[1, 2, 3, 4, 100]]
    expectedResult: 0.8863636363636364

  - methodName: outlierSensitivity
    args: [[10, 10, 10, 10, 10]]
    expectedResult: 0.0

  - methodName: outlierSensitivity
    args: [[1, 1, 1, 50]]
    expectedResult: 0.9245283018867925

  - methodName: outlierSensitivity
    args: [[5, 5, 5, 5, 6]]
    expectedResult: 0.038461538461538464

