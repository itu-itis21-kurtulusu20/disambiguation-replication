prompt: >
  Create a Java utility class named IsolationAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double isolationScore(int[] values)

  Requirement:
  "Return a score measuring how isolated the maximum value is from the rest.
   A higher score means the maximum is more separated from other values.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.IsolationAmbiguity

tests:
  - methodName: isolationScore
    args: [[1, 2, 3, 4, 100]]
    expectedResult: 96.0
  - methodName: isolationScore
    args: [[10, 10, 10, 10, 10]]
    expectedResult: 0.0
  - methodName: isolationScore
    args: [[1, 1, 1, 5]]
    expectedResult: 4.0
  - methodName: isolationScore
    args: [[1, 50, 51]]
    expectedResult: 1.0
  - methodName: isolationScore
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0
