prompt: >
  Create a Java utility class named TypicalSizeAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double typicalSize(int[] values)

  Requirement:
  "Return the typical size of the values in the dataset. If fewer than 1 element, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.TypicalSizeAmbiguity

tests:
  - methodName: typicalSize
    args: [[1, 1, 1, 1, 100]]
    expectedResult: 1.0

  - methodName: typicalSize
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 3.0

  - methodName: typicalSize
    args: [[10, 10, 10, 50]]
    expectedResult: 10.0

  - methodName: typicalSize
    args: [[-5, 5, -5, 5]]
    expectedResult: 0.0

