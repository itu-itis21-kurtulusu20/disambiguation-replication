prompt: >
  Create a Java utility class named RoughnessAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double roughness(int[] values)

  Requirement:
  "Return a score capturing how rough or jagged the sequence is.
   A smooth sequence like [1,2,3,4] should have a low roughness score.
   A wildly oscillating sequence should have a high roughness score.
   The score should reflect the typical size of jumps between consecutive values.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.RoughnessAmbiguity

tests:
  - methodName: roughness
    args: [[1,3,1,3,1]]
    expectedResult: 2.0

  - methodName: roughness
    args: [[1,2,3,4,5]]
    expectedResult: 1.0

  - methodName: roughness
    args: [[10,1,10,1,10]]
    expectedResult: 9.0

  - methodName: roughness
    args: [[5,5,5,5]]
    expectedResult: 0.0

  - methodName: roughness
    args: [[1,10,2,9,3]]
    expectedResult: 7.5
