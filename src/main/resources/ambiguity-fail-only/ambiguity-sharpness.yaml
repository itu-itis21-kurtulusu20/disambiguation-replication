prompt: >
  Create a Java utility class named SharpnessAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double sharpness(int[] values)

  Requirement:
  "Return the average sharpness of changes in the sequence. Sharp changes are large sudden jumps. Gradual changes are small steps. If fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.SharpnessAmbiguity

tests:
  - methodName: sharpness
    args: [[1, 10, 1, 10, 1]]
    expectedResult: 9.0

  - methodName: sharpness
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.0

  - methodName: sharpness
    args: [[1, 1, 1, 1, 10]]
    expectedResult: 3.897114317029974

  - methodName: sharpness
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0

