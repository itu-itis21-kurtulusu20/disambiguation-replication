prompt: >
  Create a Java utility class named CoherenceAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double coherence(int[] values)

  Requirement:
  "Return the coherence of the sequence from 0 to 1. High coherence means consecutive values are similar. Low coherence means they jump around. If fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.CoherenceAmbiguity

tests:
  - methodName: coherence
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.75

  - methodName: coherence
    args: [[1, 100, 1, 100]]
    expectedResult: 0.0

  - methodName: coherence
    args: [[10, 10, 10, 10]]
    expectedResult: 1.0

  - methodName: coherence
    args: [[1, 3, 2, 4]]
    expectedResult: 0.5555555555555556

