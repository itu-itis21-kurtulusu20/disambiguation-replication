prompt: >
  Create a Java utility class named RegularityAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double regularity(int[] values)

  Requirement:
  "Return a score measuring how regular the spacing between consecutive values is.
   Perfectly regular spacing (equal gaps) should score 1.0.
   Highly irregular spacing should score close to 0.0.
   If the array has fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.RegularityAmbiguity

tests:
  - methodName: regularity
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0
  - methodName: regularity
    args: [[1, 1, 1, 10]]
    expectedResult: 0.4142135623730951
  - methodName: regularity
    args: [[1, 3, 5, 7, 9]]
    expectedResult: 1.0
  - methodName: regularity
    args: [[1, 2, 4, 8]]
    expectedResult: 0.6516685226452118
  - methodName: regularity
    args: [[1, 5, 6, 7, 100]]
    expectedResult: 0.38567510831875024
