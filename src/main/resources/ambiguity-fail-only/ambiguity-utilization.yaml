prompt: >
  Create a Java utility class named UtilizationAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double utilization(int[] values)

  Requirement:
  "Return the utilization rate from 0 to 1. How much of the potential is being used. If fewer than 1 element, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.UtilizationAmbiguity

tests:
  - methodName: utilization
    args: [[10, 10, 10, 10]]
    expectedResult: 1.0

  - methodName: utilization
    args: [[5, 5, 5, 10]]
    expectedResult: 0.5

  - methodName: utilization
    args: [[1, 1, 1, 100]]
    expectedResult: 0.01

  - methodName: utilization
    args: [[0, 0, 0, 0]]
    expectedResult: 0.0

