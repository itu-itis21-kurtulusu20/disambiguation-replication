prompt: >
  Create a Java utility class named CenterAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double center(int[] values)

  Requirement:
  "Return the center of the dataset. If fewer than 1 element, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.CenterAmbiguity

tests:
  - methodName: center
    args: [[1, 1, 1, 1, 100]]
    expectedResult: 50.5

  - methodName: center
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 3.0

  - methodName: center
    args: [[10, 20, 30]]
    expectedResult: 20.0

  - methodName: center
    args: [[-10, 0, 100]]
    expectedResult: 45.0

