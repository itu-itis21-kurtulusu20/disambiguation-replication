prompt: >
  Create a Java utility class named LocalVariationAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double localVariation(int[] values)

  Requirement:
  "Return the local variation in the sequence. This measures how much values change from one position to the next. If fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.LocalVariationAmbiguity

tests:
  - methodName: localVariation
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.0

  - methodName: localVariation
    args: [[1, 10, 1, 10]]
    expectedResult: 8.48528137423857

  - methodName: localVariation
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0

  - methodName: localVariation
    args: [[1, 3, 2, 4]]
    expectedResult: 1.4142135623730951

