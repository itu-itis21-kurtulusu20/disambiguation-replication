prompt: >
  Create a Java utility class named DispersionRatioAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double dispersionRatio(int[] values)

  Requirement:
  "Return the dispersion of the values relative to their average. This ratio measures how dispersed the data is compared to its central tendency. If fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.DispersionRatioAmbiguity

tests:
  - methodName: dispersionRatio
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.6666666666666666

  - methodName: dispersionRatio
    args: [[10, 10, 10, 10]]
    expectedResult: 0.0

  - methodName: dispersionRatio
    args: [[1, 1, 1, 100]]
    expectedResult: 71.36650485436893

  - methodName: dispersionRatio
    args: [[2, 8]]
    expectedResult: 1.8

