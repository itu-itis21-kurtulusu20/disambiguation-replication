prompt: >
  Create a Java utility class named VolatilityAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):
  public static double volatilityScore(int[] values)

  Requirement (intentionally misleading/ambiguous):
  "Return a volatility score that represents how much the series changes from one item to the next.
   Compute the average change between consecutive elements.
   

  Notes:
  - If the array is null, empty, or has length 1, return 0.0.
  - Return a double.

fullClassName: com.example.llmdyn.dynamic.utils.VolatilityAmbiguity
tests:
  # These expected results enforce RMS of consecutive differences: sqrt(mean(delta^2))
  - methodName: volatilityScore
    args: [[1,2,3,4]]
    expectedResult: 1.0

  - methodName: volatilityScore
    args: [[1,3,6,10]]
    expectedResult: 3.1091263510296048

  - methodName: volatilityScore
    args: [[0,2,2,8]]
    expectedResult: 3.6514837167011076

  - methodName: volatilityScore
    args: [[5,5,5,5]]
    expectedResult: 0.0

  - methodName: volatilityScore
    args: [[100,80,60]]
    expectedResult: 20.0

  - methodName: volatilityScore
    args: [[0,10]]
    expectedResult: 10.0