prompt: >
  Create a Java utility class named TrendConsistencyAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double trendConsistency(int[] values)

  Requirement:
  "Return a score from 0 to 1 measuring how consistently the sequence follows its overall trend. 1.0 means every step follows the trend perfectly. If fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.TrendConsistencyAmbiguity

tests:
  - methodName: trendConsistency
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0

  - methodName: trendConsistency
    args: [[1, 3, 2, 4, 3]]
    expectedResult: 0.5

  - methodName: trendConsistency
    args: [[5, 4, 3, 2, 1]]
    expectedResult: 1.0

  - methodName: trendConsistency
    args: [[1, 10, 2, 9, 3]]
    expectedResult: 0.5

  - methodName: trendConsistency
    args: [[1, 2, 1, 2, 1]]
    expectedResult: 0.5

