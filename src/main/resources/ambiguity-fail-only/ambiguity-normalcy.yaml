prompt: >
  Create a Java utility class named NormalcyAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double normalcy(int[] values)

  Requirement:
  "Return a score from 0 to 1 measuring how normal the distribution is. 1.0 means perfectly normal. If fewer than 4 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.NormalcyAmbiguity

tests:
  - methodName: normalcy
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.43478260869565205

  - methodName: normalcy
    args: [[1, 1, 1, 100]]
    expectedResult: 0.5999999999999999

  - methodName: normalcy
    args: [[10, 10, 10, 10]]
    expectedResult: 1.0

  - methodName: normalcy
    args: [[1, 2, 2, 3]]
    expectedResult: 0.4999999999999998

