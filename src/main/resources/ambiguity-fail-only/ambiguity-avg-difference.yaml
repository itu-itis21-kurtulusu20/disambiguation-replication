prompt: >
  Create a Java utility class named AvgDifferenceAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double averageDifference(int[] values)

  Requirement:
  "Return the average difference between consecutive values in the sequence. If fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.AvgDifferenceAmbiguity

tests:
  - methodName: averageDifference
    args: [[1, 3, 1, 3, 1]]
    expectedResult: 0.0

  - methodName: averageDifference
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0

  - methodName: averageDifference
    args: [[10, 1, 10, 1]]
    expectedResult: -3.0

  - methodName: averageDifference
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0

  - methodName: averageDifference
    args: [[1, 5, 2, 8]]
    expectedResult: 2.3333333333333335

