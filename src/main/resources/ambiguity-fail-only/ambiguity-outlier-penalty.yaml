prompt: >
  Create a Java utility class named OutlierPenaltyAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double outlierPenalty(int[] values)

  Requirement:
  "Return the total penalty incurred by outlier values. An outlier is a value that is far from the typical values. Larger deviations should incur disproportionately higher penalties. If fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.OutlierPenaltyAmbiguity

tests:
  - methodName: outlierPenalty
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 10.0

  - methodName: outlierPenalty
    args: [[1, 1, 1, 1, 100]]
    expectedResult: 9801.0

  - methodName: outlierPenalty
    args: [[10, 10, 10, 10, 10]]
    expectedResult: 0.0

  - methodName: outlierPenalty
    args: [[1, 2, 3, 4, 100]]
    expectedResult: 9415.0

