prompt: >
  Create a Java utility class named SensitivityScoreAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double sensitivityScore(int[] values)

  Requirement:
  "Return how sensitive the sequence is to position changes. If fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.SensitivityScoreAmbiguity

tests:
  - methodName: sensitivityScore
    args: [[1, 10, 1, 10, 1]]
    expectedResult: 1.0

  - methodName: sensitivityScore
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0

  - methodName: sensitivityScore
    args: [[10, 10, 10, 10]]
    expectedResult: 0.0

  - methodName: sensitivityScore
    args: [[1, 1, 100, 1, 1]]
    expectedResult: 2.0

