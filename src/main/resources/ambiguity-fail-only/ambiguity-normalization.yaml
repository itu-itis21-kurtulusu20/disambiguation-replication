prompt: >
  Create a Java utility class named NormalizationAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):
  public static double[] normalize(int[] values)

  Requirement:
  "Normalize the values so they are on a standard scale.
   The result should reflect how many standard units each value
   is away from the typical value in the dataset.
   Positive results mean above average, negative means below average."

  Notes:
  - If null or empty, return empty array
  - If all values are equal, return array of zeros
  - Return a double[]

fullClassName: com.example.llmdyn.dynamic.utils.NormalizationAmbiguity

tests:
  - methodName: normalize
    args: [[2, 4, 4, 4, 5, 5, 7, 9]]
    expectedResult: [-1.5, -0.5, -0.5, -0.5, 0.0, 0.0, 1.0, 2.0]

  - methodName: normalize
    args: [[10, 20, 30]]
    expectedResult: [-1.2247448713915890, 0.0, 1.2247448713915890]

  - methodName: normalize
    args: [[5, 5, 5]]
    expectedResult: [0.0, 0.0, 0.0]

  - methodName: normalize
    args: [[0, 100]]
    expectedResult: [-1.0, 1.0]

  - methodName: normalize
    args: [[1, 2, 3, 4, 5]]
    expectedResult: [-1.4142135623730951, -0.7071067811865476, 0.0, 0.7071067811865476, 1.4142135623730951]
