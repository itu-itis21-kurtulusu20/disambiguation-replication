prompt: >
  Create a Java utility class named DistanceToCenterAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double distanceToCenter(int[] values)

  Requirement:
  "Return the average distance of each value from the center of the dataset. If fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.DistanceToCenterAmbiguity

tests:
  - methodName: distanceToCenter
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.2

  - methodName: distanceToCenter
    args: [[10, 10, 10, 10]]
    expectedResult: 0.0

  - methodName: distanceToCenter
    args: [[1, 1, 1, 100]]
    expectedResult: 24.75

  - methodName: distanceToCenter
    args: [[-5, 5]]
    expectedResult: 5.0

