prompt: >
  Create a Java utility class named SupportAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double support(int[] values)

  Requirement:
  "Return the fraction of steps that support the overall direction. If fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.SupportAmbiguity

tests:
  - methodName: support
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0

  - methodName: support
    args: [[5, 4, 3, 2, 1]]
    expectedResult: 1.0

  - methodName: support
    args: [[1, 3, 1, 3, 1]]
    expectedResult: 0.5

  - methodName: support
    args: [[1, 2, 1, 2, 5]]
    expectedResult: 0.75

