prompt: >
  Create a Java utility class named TrendDeviationAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double trendDeviation(int[] values)

  Requirement:
  "Return how much the sequence deviates from a straight line. A perfectly linear sequence scores 0. If fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.TrendDeviationAmbiguity

tests:
  - methodName: trendDeviation
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.0

  - methodName: trendDeviation
    args: [[1, 4, 9, 16, 25]]
    expectedResult: 1.6733200530681511

  - methodName: trendDeviation
    args: [[1, 10, 1, 10, 1]]
    expectedResult: 4.409081537009721

  - methodName: trendDeviation
    args: [[1, 2, 3, 4, 100]]
    expectedResult: 26.870057685088806

