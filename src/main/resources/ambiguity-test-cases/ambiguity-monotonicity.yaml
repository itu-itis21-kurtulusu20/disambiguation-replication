prompt: >
  Create a Java utility class named MonotonicityAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):
  public static double monotonicityScore(int[] values)

  Requirement:
  "Return a score between -1.0 and 1.0 representing how monotone
   the sequence is.
   A perfectly increasing sequence returns 1.0.
   A perfectly decreasing sequence returns -1.0.
   A score of 0.0 means no monotone trend.
   The score should be based on the rank ordering of values,
   not their absolute differences."

  Notes:
  - If null, empty, or single element, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.MonotonicityAmbiguity

tests:
  - methodName: monotonicityScore
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0

  - methodName: monotonicityScore
    args: [[5, 4, 3, 2, 1]]
    expectedResult: -1.0

  - methodName: monotonicityScore
    args: [[1, 3, 2, 4, 3, 5]]
    expectedResult: 0.8857142857142857

  - methodName: monotonicityScore
    args: [[1, 1, 2, 2, 3]]
    expectedResult: 1.0

  - methodName: monotonicityScore
    args: [[3, 1, 4, 1, 5]]
    expectedResult: 0.5
