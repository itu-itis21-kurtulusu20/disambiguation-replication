prompt: >
  Create a Java utility class named CorrelationAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):
  public static double correlationScore(int[] a, int[] b)

  Requirement:
  "Return a score between -1.0 and 1.0 representing how strongly
   the two sequences are related.
   A score of 1.0 means they move together perfectly.
   A score of -1.0 means they move in perfectly opposite directions.
   A score of 0.0 means no relationship.
   The measure should be robust to outliers and non-linear relationships."

  Notes:
  - Arrays will always be the same length and have at least 2 elements
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.CorrelationAmbiguity

tests:
  - methodName: correlationScore
    args: [[1, 2, 3, 4, 5], [2, 4, 6, 8, 10]]
    expectedResult: 1.0

  - methodName: correlationScore
    args: [[1, 2, 3, 4, 5], [5, 4, 3, 2, 1]]
    expectedResult: -1.0

  - methodName: correlationScore
    args: [[1, 2, 3, 4, 100], [1, 2, 3, 4, 5]]
    expectedResult: 1.0

  - methodName: correlationScore
    args: [[1, 2, 4, 8, 16], [5, 4, 3, 2, 1]]
    expectedResult: -1.0

  - methodName: correlationScore
    args: [[10, 1, 10, 1, 10], [1, 2, 3, 4, 5]]
    expectedResult: 0.5
