llm:
  api:
    key: PUT_YOUR_API_KEY_HERE
  provider: deepseek
  default-provider: ollama
  providers:
    ollama:
      base-url: http://localhost:11434
      model: deepseek-coder:6.7b
      temperature: 0.1
      max-tokens: 2048
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: https://api.openai.com/v1
      model: gpt-4
      temperature: 0.1
    gemini:
      api-key: ${GEMINI_API_KEY}
      base-url: https://generativelanguage.googleapis.com/v1beta
      model: gemini-2.5-flash
      temperature: 0.1
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: https://api.deepseek.com
      model: deepseek-chat
      temperature: 0.1
      max-tokens: 4096
    claude:
      api-key: ${ANTHROPIC_API_KEY}
      base-url: https://api.anthropic.com/v1
      model: claude-sonnet-4-6
      temperature: 0.1
      max-tokens: 8096

dynamic:
  compile:
    output: ./generated-classes

server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/postgres
    username: postgres
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        enable_lazy_load_no_trans: true
        globally_quoted_identifiers: true
testcases:
  root-dir: src/main/resources/test-cases
  dir: src/main/resources/test-cases
  cleanup:
    drop-all-before-run-all: true
    clear-before-each-case: false

analysis:
  enabled: true
  max-source-chars: 4000
  max-stack-chars: 2500

prompt:
  enhanced:
    include-jpa-guidelines: true

