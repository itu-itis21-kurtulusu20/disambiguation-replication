prompt: >
  Create a Java utility class named ClusterCountAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double clusteredness(int[] values)

  Requirement:
  "Return clusteredness = 1.0 - (stdev / range),
   where stdev is the population standard deviation of the values,
   range = max - min, and the result is clamped to [0,1].
   If range == 0, return 1.0.
   If the array has fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.ClusterCountAmbiguity

tests:
  - methodName: clusteredness
    args: [[5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: clusteredness
    args: [[1, 2, 3, 100, 101, 102]]
    expectedResult: 0.5
  - methodName: clusteredness
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.6
  - methodName: clusteredness
    args: [[1, 50, 100]]
    expectedResult: 0.0
