prompt: >
  Create a Java utility class named ClarityAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double clarity(int[] values)

  Requirement:
  "Return the clarity of the dataset, defined as
   the AVERAGE ABSOLUTE DIFFERENCE between consecutive sorted values:
   sort the array ascending, then compute the mean of |sorted[i+1] - sorted[i]|
   over all consecutive pairs.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.ClarityAmbiguity

tests:
  - methodName: clarity
    args: [[1, 5, 9, 13]]
    expectedResult: 4.0
  - methodName: clarity
    args: [[10, 11, 10, 11]]
    expectedResult: 1.0
  - methodName: clarity
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: clarity
    args: [[1, 100]]
    expectedResult: 99.0
