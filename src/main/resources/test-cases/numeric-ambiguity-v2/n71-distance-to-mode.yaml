prompt: >
  Create a Java utility class named DistanceToModeAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double distanceToMode(int[] values)

  Requirement:
  "Return the average distance from each value to the most representative point of the dataset.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.DistanceToModeAmbiguity

tests:
  - methodName: distanceToMode
    args: [[1, 2, 2, 2, 5]]
    expectedResult: 1.6
  - methodName: distanceToMode
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: distanceToMode
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.2
  - methodName: distanceToMode
    args: [[3, 3, 3, 10]]
    expectedResult: 1.75
