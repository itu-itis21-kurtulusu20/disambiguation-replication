prompt: >
  Create a Java utility class named PositionFromBaselineAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double positionFromBaseline(int[] values)

  Requirement:
  "Return the typical position of the values measured from a baseline.
   If the array has fewer than 1 element, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.PositionFromBaselineAmbiguity

tests:
  - methodName: positionFromBaseline
    args: [[10, 20, 30]]
    expectedResult: 20.0
  - methodName: positionFromBaseline
    args: [[5, 5, 5]]
    expectedResult: 5.0
  - methodName: positionFromBaseline
    args: [[-5, 0, 5]]
    expectedResult: 5.0
  - methodName: positionFromBaseline
    args: [[100, 100, 100, 100]]
    expectedResult: 100.0
