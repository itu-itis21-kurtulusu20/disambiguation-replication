prompt: >
  Create a Java utility class named RelativeToTypicalAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double relativeToTypical(int[] values)

  Requirement:
  "Return how the maximum value compares to the typical value of the dataset, as a ratio.
   If the array has fewer than 2 elements or the typical value is zero, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.RelativeToTypicalAmbiguity

tests:
  - methodName: relativeToTypical
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.667
  - methodName: relativeToTypical
    args: [[5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: relativeToTypical
    args: [[1, 1, 1, 1, 100]]
    expectedResult: 100.0
  - methodName: relativeToTypical
    args: [[10, 20, 30, 40]]
    expectedResult: 1.6
