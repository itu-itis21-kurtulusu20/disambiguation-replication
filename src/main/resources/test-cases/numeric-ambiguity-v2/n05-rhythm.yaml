prompt: >
  Create a Java utility class named RhythmAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double rhythm(int[] values)

  Requirement:
  "Return the rhythm of the sequence.
   A strong rhythm means a clear repeating pattern in the values.
   If the array has fewer than 4 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.RhythmAmbiguity

tests:
  - methodName: rhythm
    args: [[1, 2, 1, 2, 1, 2]]
    expectedResult: 1.0
  - methodName: rhythm
    args: [[1, 2, 3, 4, 5, 6]]
    expectedResult: 0.0
  - methodName: rhythm
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: rhythm
    args: [[3, 1, 4, 1, 5, 9]]
    expectedResult: 0.25
