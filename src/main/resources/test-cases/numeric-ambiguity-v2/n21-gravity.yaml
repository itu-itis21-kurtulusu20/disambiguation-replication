prompt: >
  Create a Java utility class named GravityAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double gravity(int[] values)

  Requirement:
  "Return the gravity of the dataset.
   Gravity reflects how strongly the values are pulled toward a dominant point.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.GravityAmbiguity

tests:
  - methodName: gravity
    args: [[5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: gravity
    args: [[1, 5, 5, 5, 9]]
    expectedResult: 0.6
  - methodName: gravity
    args: [[1, 2, 3, 4]]
    expectedResult: 0.0
  - methodName: gravity
    args: [[10, 10, 10, 1]]
    expectedResult: 0.75
