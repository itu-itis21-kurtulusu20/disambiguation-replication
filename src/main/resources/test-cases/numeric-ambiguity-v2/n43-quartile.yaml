prompt: >
  Create a Java utility class named QuartileAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double firstQuartile(int[] values)

  Requirement:
  "Return the first quartile (Q1) of the values.
   The first quartile is the value below which 25 percent of the data lies.
   If the array has fewer than 4 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.QuartileAmbiguity

tests:
  - methodName: firstQuartile
    args: [[1, 2, 3, 4, 5, 6, 7, 8]]
    expectedResult: 2.25
  - methodName: firstQuartile
    args: [[1, 3, 5, 7]]
    expectedResult: 2.5
  - methodName: firstQuartile
    args: [[10, 20, 30, 40, 50]]
    expectedResult: 20.0
  - methodName: firstQuartile
    args: [[1, 2, 3, 4]]
    expectedResult: 1.75
