prompt: >
  Create a Java utility class named FractionAboveTypicalAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double fractionAboveTypical(int[] values)

  Requirement:
  "Return the fraction (between 0.0 and 1.0) of values that lie above the typical value of the dataset.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.FractionAboveTypicalAmbiguity

tests:
  - methodName: fractionAboveTypical
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.4
  - methodName: fractionAboveTypical
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: fractionAboveTypical
    args: [[1, 1, 1, 1, 100]]
    expectedResult: 0.2
  - methodName: fractionAboveTypical
    args: [[1, 2, 3, 4]]
    expectedResult: 0.5
