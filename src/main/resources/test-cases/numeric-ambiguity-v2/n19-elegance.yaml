prompt: >
  Create a Java utility class named EleganceAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double elegance(int[] values)

  Requirement:
  "Return the elegance of the sequence.
   An elegant sequence achieves much expressiveness with minimal complexity.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.EleganceAmbiguity

tests:
  - methodName: elegance
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0
  - methodName: elegance
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: elegance
    args: [[1, 100, 2, 99, 3]]
    expectedResult: 0.2
  - methodName: elegance
    args: [[2, 4, 6, 8, 10]]
    expectedResult: 1.0
