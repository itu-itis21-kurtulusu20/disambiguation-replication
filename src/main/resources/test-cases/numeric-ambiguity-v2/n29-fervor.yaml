prompt: >
  Create a Java utility class named FervorAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double fervor(int[] values)

  Requirement:
  "Return the fervor of the sequence.
   Fervor captures the passionate intensity of changes within the data.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.FervorAmbiguity

tests:
  - methodName: fervor
    args: [[1, 5, 2, 8, 3]]
    expectedResult: 4.5
  - methodName: fervor
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: fervor
    args: [[1, 2, 3, 4]]
    expectedResult: 1.0
  - methodName: fervor
    args: [[10, 1, 10, 1]]
    expectedResult: 9.0
