prompt: >
  Create a Java utility class named SummaryNoiseAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double summaryNoise(int[] values)

  Requirement:
  "Return a single summary number reflecting the noise present in the values.
   The result should remain interpretable in the original units.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.SummaryNoiseAmbiguity

tests:
  - methodName: summaryNoise
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: summaryNoise
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.581
  - methodName: summaryNoise
    args: [[1, 1, 1, 1, 100]]
    expectedResult: 1.483
  - methodName: summaryNoise
    args: [[10, 20, 30, 40]]
    expectedResult: 12.91
