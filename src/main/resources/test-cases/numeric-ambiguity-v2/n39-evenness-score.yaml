prompt: >
  Create a Java utility class named EvennessScoreAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double evennessScore(int[] values)

  Requirement:
  "Return an evenness score from 0.0 to 1.0.
   1.0 means values are perfectly evenly distributed across the observed range.
   0.0 means they are clumped at one extreme.
   If the array has fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.EvennessScoreAmbiguity

tests:
  - methodName: evennessScore
    args: [[1, 5, 9]]
    expectedResult: 1.0
  - methodName: evennessScore
    args: [[1, 1, 1, 9]]
    expectedResult: 0.25
  - methodName: evennessScore
    args: [[1, 4, 7, 10]]
    expectedResult: 1.0
  - methodName: evennessScore
    args: [[5, 5, 5]]
    expectedResult: 0.0
