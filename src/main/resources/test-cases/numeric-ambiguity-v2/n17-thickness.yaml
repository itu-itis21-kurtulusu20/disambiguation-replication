prompt: >
  Create a Java utility class named ThicknessAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double thickness(int[] values)

  Requirement:
  "Return the thickness of the dataset.
   A thicker dataset has values densely populated within its central region.
   If the array has fewer than 4 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.ThicknessAmbiguity

tests:
  - methodName: thickness
    args: [[1, 5, 5, 5, 5, 9]]
    expectedResult: 4.0
  - methodName: thickness
    args: [[1, 2, 3, 4, 5, 6]]
    expectedResult: 1.0
  - methodName: thickness
    args: [[1, 100, 50, 50, 50, 100]]
    expectedResult: 99.0
  - methodName: thickness
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
