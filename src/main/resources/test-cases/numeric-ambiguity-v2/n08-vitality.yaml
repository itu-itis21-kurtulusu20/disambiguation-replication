prompt: >
  Create a Java utility class named VitalityAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double vitality(int[] values)

  Requirement:
  "Return the vitality of the sequence.
   A sequence with strong vitality is alive with movement and change.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.VitalityAmbiguity

tests:
  - methodName: vitality
    args: [[1, 5, 2, 8, 3]]
    expectedResult: 4.5
  - methodName: vitality
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: vitality
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0
  - methodName: vitality
    args: [[10, 0, 10, 0]]
    expectedResult: 10.0
