prompt: >
  Create a Java utility class named TightnessAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double tightness(int[] values)

  Requirement:
  "Return the tightness of the dataset.
   A tight dataset has values clustered close to one another.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.TightnessAmbiguity

tests:
  - methodName: tightness
    args: [[5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: tightness
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.25
  - methodName: tightness
    args: [[1, 100]]
    expectedResult: 0.01
  - methodName: tightness
    args: [[10, 11, 10, 11]]
    expectedResult: 0.909
