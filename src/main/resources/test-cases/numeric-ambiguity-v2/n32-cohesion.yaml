prompt: >
  Create a Java utility class named CohesionAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double cohesion(int[] values)

  Requirement:
  "Return the cohesion of the dataset.
   A cohesive dataset feels glued together with values that belong to one another.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.CohesionAmbiguity

tests:
  - methodName: cohesion
    args: [[5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: cohesion
    args: [[1, 100, 2, 99]]
    expectedResult: 0.0
  - methodName: cohesion
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.5
  - methodName: cohesion
    args: [[10, 11, 12, 11, 10]]
    expectedResult: 0.8
