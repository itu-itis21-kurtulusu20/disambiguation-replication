prompt: >
  Create a Java utility class named CleanlinessScoreAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double cleanlinessScore(int[] values)

  Requirement:
  "Return a score from 0.0 to 1.0 measuring how clean the dataset is.
   A perfectly clean dataset has no anomalies (1.0).
   The presence of any clearly out-of-place values lowers the score.
   If the array has fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.CleanlinessScoreAmbiguity

tests:
  - methodName: cleanlinessScore
    args: [[5, 5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: cleanlinessScore
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0
  - methodName: cleanlinessScore
    args: [[1, 2, 3, 100, 4, 5]]
    expectedResult: 0.833
  - methodName: cleanlinessScore
    args: [[1, 1, 1, 1, 999]]
    expectedResult: 0.8
