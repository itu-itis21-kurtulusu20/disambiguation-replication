prompt: >
  Create a Java utility class named TypicalJumpAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double typicalJump(int[] values)

  Requirement:
  "Return the typical jump size between consecutive values.
   The metric should be robust against a small number of large jumps.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.TypicalJumpAmbiguity

tests:
  - methodName: typicalJump
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0
  - methodName: typicalJump
    args: [[1, 2, 3, 4, 100]]
    expectedResult: 1.0
  - methodName: typicalJump
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: typicalJump
    args: [[1, 5, 1, 5, 1, 5]]
    expectedResult: 4.0
