prompt: >
  Create a Java utility class named ClusterCountAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double clusteredness(int[] values)

  Requirement:
  "Return a score from 0.0 to 1.0 indicating how clustered the values are.
   Tightly grouped values produce a high score; spread-out values a low one.
   If the array has fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.ClusterCountAmbiguity

tests:
  - methodName: clusteredness
    args: [[5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: clusteredness
    args: [[1, 2, 3, 100, 101, 102]]
    expectedResult: 0.5
  - methodName: clusteredness
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.6
  - methodName: clusteredness
    args: [[1, 50, 100]]
    expectedResult: 0.0
