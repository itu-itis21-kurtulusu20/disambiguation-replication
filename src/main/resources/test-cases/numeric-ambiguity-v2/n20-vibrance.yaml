prompt: >
  Create a Java utility class named VibranceAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double vibrance(int[] values)

  Requirement:
  "Return the vibrance of the sequence.
   A vibrant sequence is full of life and varied movement.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.VibranceAmbiguity

tests:
  - methodName: vibrance
    args: [[1, 5, 2, 8, 3, 9]]
    expectedResult: 5.0
  - methodName: vibrance
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: vibrance
    args: [[1, 2, 3, 4]]
    expectedResult: 1.0
  - methodName: vibrance
    args: [[10, 20, 30, 40]]
    expectedResult: 10.0
