prompt: >
  Create a Java utility class named PurityAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double purity(int[] values)

  Requirement:
  "Return the purity of the dataset from 0 to 1.
   A pure dataset is dominated by a single dominant value.
   If the array has fewer than 1 element, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.PurityAmbiguity

tests:
  - methodName: purity
    args: [[1, 1, 1, 2]]
    expectedResult: 0.75
  - methodName: purity
    args: [[5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: purity
    args: [[1, 2, 3, 4]]
    expectedResult: 0.25
  - methodName: purity
    args: [[7, 7, 8, 8]]
    expectedResult: 0.5
