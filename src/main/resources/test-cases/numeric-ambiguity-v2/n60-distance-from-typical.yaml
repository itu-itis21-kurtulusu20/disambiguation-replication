prompt: >
  Create a Java utility class named DistanceFromTypicalAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double distanceFromTypical(int[] values)

  Requirement:
  "Return the average distance of each value from the typical value of the dataset.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.DistanceFromTypicalAmbiguity

tests:
  - methodName: distanceFromTypical
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.2
  - methodName: distanceFromTypical
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: distanceFromTypical
    args: [[1, 1, 1, 1, 100]]
    expectedResult: 0.0
  - methodName: distanceFromTypical
    args: [[10, 20, 30, 40]]
    expectedResult: 10.0
