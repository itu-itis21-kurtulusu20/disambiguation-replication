prompt: >
  Create a Java utility class named GritAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double grit(int[] values)

  Requirement:
  "Return the grit of the sequence.
   Grit reflects steady persistence of small steady values against headwinds.
   If the array has fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.GritAmbiguity

tests:
  - methodName: grit
    args: [[5, 5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: grit
    args: [[5, 4, 6, 5, 4, 6]]
    expectedResult: 0.8
  - methodName: grit
    args: [[1, 100, 1, 100]]
    expectedResult: 0.0
  - methodName: grit
    args: [[3, 4, 3, 4, 3, 4]]
    expectedResult: 0.9
