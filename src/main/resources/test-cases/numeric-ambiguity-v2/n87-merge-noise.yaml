prompt: >
  Create a Java utility class named MergeNoiseAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double mergeNoise(int[] values)

  Requirement:
  "Return a single number that represents the typical noise level after merging the values.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.MergeNoiseAmbiguity

tests:
  - methodName: mergeNoise
    args: [[10, 10, 10, 10]]
    expectedResult: 0.0
  - methodName: mergeNoise
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 1.0
  - methodName: mergeNoise
    args: [[1, 1, 1, 1, 100]]
    expectedResult: 0.0
  - methodName: mergeNoise
    args: [[5, 7, 6, 8, 5]]
    expectedResult: 1.0
