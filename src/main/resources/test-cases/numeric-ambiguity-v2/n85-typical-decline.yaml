prompt: >
  Create a Java utility class named TypicalDeclineAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double typicalDecline(int[] values)

  Requirement:
  "Return the typical size of the declining steps in the sequence.
   If there are no declines, return 0.0.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.TypicalDeclineAmbiguity

tests:
  - methodName: typicalDecline
    args: [[5, 4, 3, 2, 1]]
    expectedResult: 1.0
  - methodName: typicalDecline
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.0
  - methodName: typicalDecline
    args: [[10, 5, 8, 2, 6]]
    expectedResult: 5.0
  - methodName: typicalDecline
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
