prompt: >
  Create a Java utility class named QualityScoreAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double qualityScore(int[] values)

  Requirement:
  "Return the quality score of the dataset between 0.0 and 1.0.
   Higher quality datasets are tightly distributed and free of erratic jumps.
   If the array has fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.QualityScoreAmbiguity

tests:
  - methodName: qualityScore
    args: [[5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: qualityScore
    args: [[1, 100, 1, 100]]
    expectedResult: 0.0
  - methodName: qualityScore
    args: [[5, 5, 6, 5, 5, 6]]
    expectedResult: 0.8
  - methodName: qualityScore
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.6
