prompt: >
  Create a Java utility class named RankCorrelationAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double rankCorrelation(int[] a, int[] b)

  Requirement:
  "Return a rank-based correlation coefficient between -1.0 and 1.0
   between two equal-length integer sequences.
   The score should depend only on the order of values, not their magnitudes.
   If arrays are null, empty, or different lengths, return 0.0."

  Notes:
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.RankCorrelationAmbiguity

tests:
  - methodName: rankCorrelation
    args: [[1, 2, 3], [10, 20, 30]]
    expectedResult: 1.0
  - methodName: rankCorrelation
    args: [[1, 2, 3], [30, 20, 10]]
    expectedResult: -1.0
  - methodName: rankCorrelation
    args: [[1, 2, 3, 4], [3, 1, 4, 2]]
    expectedResult: 0.0
  - methodName: rankCorrelation
    args: [[1, 2, 3, 4, 5], [1, 3, 2, 5, 4]]
    expectedResult: 0.6
