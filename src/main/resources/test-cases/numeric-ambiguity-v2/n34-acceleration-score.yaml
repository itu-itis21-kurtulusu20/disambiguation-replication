prompt: >
  Create a Java utility class named AccelerationScoreAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double accelerationScore(int[] values)

  Requirement:
  "Return a score that reflects how the rate of change is itself changing.
   A constant rate of change yields 0.
   A sequence whose rate of change grows over time yields a positive score.
   A sequence whose rate of change shrinks over time yields a negative score.
   If the array has fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.AccelerationScoreAmbiguity

tests:
  - methodName: accelerationScore
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.0
  - methodName: accelerationScore
    args: [[1, 2, 4, 8, 16]]
    expectedResult: 1.0
  - methodName: accelerationScore
    args: [[16, 8, 4, 2, 1]]
    expectedResult: -1.0
  - methodName: accelerationScore
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
