prompt: >
  Create a Java utility class named SturdinessAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double sturdiness(int[] values)

  Requirement:
  "Return the sturdiness of the dataset.
   A sturdy dataset holds its central tendency firmly even when extremes appear.
   If the array has fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.SturdinessAmbiguity

tests:
  - methodName: sturdiness
    args: [[5, 5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: sturdiness
    args: [[1, 5, 5, 5, 100]]
    expectedResult: 0.5
  - methodName: sturdiness
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.8
  - methodName: sturdiness
    args: [[1, 1, 1, 1, 999]]
    expectedResult: 0.2
