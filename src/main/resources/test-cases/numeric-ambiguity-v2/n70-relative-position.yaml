prompt: >
  Create a Java utility class named RelativePositionAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double relativePosition(int[] values)

  Requirement:
  "Return the relative position of the maximum value within the bulk of the data, between 0.0 and 1.0.
   If the array has fewer than 4 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.RelativePositionAmbiguity

tests:
  - methodName: relativePosition
    args: [[1, 2, 3, 4, 5, 6, 7, 8]]
    expectedResult: 1.0
  - methodName: relativePosition
    args: [[5, 5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: relativePosition
    args: [[1, 2, 3, 4, 100]]
    expectedResult: 32.667
  - methodName: relativePosition
    args: [[10, 20, 30, 40]]
    expectedResult: 1.667
