prompt: >
  Create a Java utility class named TextureAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double texture(int[] values)

  Requirement:
  "Return the texture of the sequence.
   A coarse texture has large irregular jumps; a fine texture has subtle smooth variation.
   If the array has fewer than 3 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.TextureAmbiguity

tests:
  - methodName: texture
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 0.0
  - methodName: texture
    args: [[1, 10, 1, 10, 1]]
    expectedResult: 9.0
  - methodName: texture
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: texture
    args: [[2, 5, 1, 8, 3]]
    expectedResult: 5.0
