prompt: >
  Create a Java utility class named TypicalValueAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double typicalValue(int[] values)

  Requirement:
  "Return the typical value of the dataset.
   The result should robustly represent what most observations look like.
   If the array has fewer than 1 element, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.TypicalValueAmbiguity

tests:
  - methodName: typicalValue
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 3.0
  - methodName: typicalValue
    args: [[1, 1, 1, 1, 100]]
    expectedResult: 1.0
  - methodName: typicalValue
    args: [[5, 5, 5]]
    expectedResult: 5.0
  - methodName: typicalValue
    args: [[1, 2, 3, 4, 5, 6]]
    expectedResult: 3.5
