prompt: >
  Create a Java utility class named CharmAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double charm(int[] values)

  Requirement:
  "Return the charm of the sequence.
   A charming sequence flows pleasantly without harsh jumps.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.CharmAmbiguity

tests:
  - methodName: charm
    args: [[1, 2, 3, 4]]
    expectedResult: 1.0
  - methodName: charm
    args: [[1, 100, 2, 99]]
    expectedResult: 0.0
  - methodName: charm
    args: [[5, 5, 5, 5]]
    expectedResult: 1.0
  - methodName: charm
    args: [[1, 3, 2, 4, 3, 5]]
    expectedResult: 0.5
