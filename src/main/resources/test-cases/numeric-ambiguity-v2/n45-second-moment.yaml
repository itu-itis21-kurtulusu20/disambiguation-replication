prompt: >
  Create a Java utility class named SecondMomentAmbiguity in the package:
  com.example.llmdyn.dynamic.utils

  Implement EXACTLY this method (no overloads):

  public static double secondMoment(int[] values)

  Requirement:
  "Return the second moment of the values about their mean.
   If the array has fewer than 2 elements, return 0.0."

  Notes:
  - If null or empty, return 0.0
  - Return a double

fullClassName: com.example.llmdyn.dynamic.utils.SecondMomentAmbiguity

tests:
  - methodName: secondMoment
    args: [[1, 2, 3, 4, 5]]
    expectedResult: 2.5
  - methodName: secondMoment
    args: [[5, 5, 5, 5]]
    expectedResult: 0.0
  - methodName: secondMoment
    args: [[2, 4, 4, 4, 5, 5, 7, 9]]
    expectedResult: 4.571
  - methodName: secondMoment
    args: [[1, 1, 1, 1, 1, 9]]
    expectedResult: 10.667
