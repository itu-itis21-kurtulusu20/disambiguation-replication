    args:
      - team: "T"
        value: 8
    expectedResult:
      id: 1
  - methodName: "createSprintMetric"
    args:
      - team: "T"
        value: 8
    expectedResult:
      id: 2
  - methodName: "createSprintMetric"
    args:
      - team: "T"
        value: 9
    expectedResult:
      id: 3
  - methodName: "createSprintMetric"
    args:
      - team: "T"
        value: 8
    expectedResult:
      id: 4
  - methodName: "qualityScore"
    args: ["T"]
    expectedResult: 1.0
