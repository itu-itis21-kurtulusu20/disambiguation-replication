prompt: "Write a JPA entity class for a table called \"sensor_signal\" CREATE TABLE sensor_signal ( id SERIAL PRIMARY KEY, sensor VARCHAR(50) NOT NULL, value INTEGER NOT NULL ); and repository service and controller for crud operations. Also implement anomalyCount(sensor) which returns the number of anomalous values for that sensor as a single double."
fullClassName: "com.example.llmdyn.dynamic.service.SensorAnomalyCountService"
tests:
  - methodName: "createSensorSignal"
    args:
      - sensor: "S"
        value: 10
    expectedResult:
      id: 1
  - methodName: "createSensorSignal"
    args:
      - sensor: "S"
        value: 11
    expectedResult:
      id: 2
  - methodName: "createSensorSignal"
    args:
      - sensor: "S"
        value: 12
    expectedResult:
      id: 3
  - methodName: "createSensorSignal"
    args:
      - sensor: "S"
        value: 100
    expectedResult:
      id: 4
  - methodName: "createSensorSignal"
    args:
      - sensor: "S"
        value: 200
    expectedResult:
      id: 5
  - methodName: "anomalyCount"
    args: ["S"]
    expectedResult: 2.0
