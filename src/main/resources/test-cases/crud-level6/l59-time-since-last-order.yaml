prompt: "Write a JPA entity class for a table called \"customer_order_log\" CREATE TABLE customer_order_log ( id SERIAL PRIMARY KEY, customer_id INTEGER NOT NULL, order_date DATE NOT NULL ); and repository service and controller for crud operations. Also implement daysSinceLastOrder(customerId, asOfDate) which returns the days since the customer's last order as a single double."
fullClassName: "com.example.llmdyn.dynamic.service.CustomerOrderLastService"
tests:
